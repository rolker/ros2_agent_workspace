name: Workspace Validation

"on":
  push:
    branches: [main, jazzy, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, jazzy]

jobs:
  validate-scripts:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Lint
        env:
          SKIP: check-commit-identity,no-commit-to-branch,check-branch-updates
        run: make lint

  validate-documentation:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check for required documentation
        run: |
          required_files="README.md ARCHITECTURE.md"
          for file in $required_files; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done
          echo "All required documentation files present"

      - name: Validate markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check.json'
        continue-on-error: true

  script-tests:
    name: Script tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install pytest
        # pyyaml: ci_local.sh's upstream.repos parser imports the yaml module
        # (present on ROS dev hosts via rosdep/vcstool, absent in setup-python)
        run: python3 -m pip install --upgrade pip pytest pyyaml

      # Runs .agent/scripts/tests/ (shell via bash, python via pytest). These are
      # hermetic (temp git sandboxes, stubbed gh, no network/ROS), so no build or
      # workspace setup is needed — just git (preinstalled on the runner) + pytest.
      - name: Run script tests
        run: make test-scripts

  validate-commit-identity:
    name: Validate commit identity (Mechanism C)
    runs-on: ubuntu-latest
    # Only run on PRs — there's no PR number to check against on bare pushes.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Validate PR commit authors against agent-branch convention
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .agent/hooks/check_pr_authors.py "${{ github.event.pull_request.number }}"
