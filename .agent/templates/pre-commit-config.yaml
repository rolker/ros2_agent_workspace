# Pre-commit Configuration Template for ROS 2 Project Repos
#
# Usage: Copy to .pre-commit-config.yaml in the project repo.
# Customize the items marked TODO below.
#
# Based on the pattern established in s57_tools.
# See ADR-0004/0005 for the enforcement hierarchy rationale.
#
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # allow ROS YAML tags
      - id: check-xml
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-lint
        args: ['--disabled-codes', 'C0103,C0113,C0301']
        # C0103: invalid-name (ROS packages use unconventional names)
        # C0113: missing-command (ament macros not recognized)
        # C0301: line-too-long

  # TODO: Uncomment if the repo has Python code
  # - repo: https://github.com/psf/black
  #   rev: 24.4.2
  #   hooks:
  #     - id: black
  #       args: ['--line-length=100']
  #
  # - repo: https://github.com/pycqa/flake8
  #   rev: 7.1.1
  #   hooks:
  #     - id: flake8
  #       args: ['--max-line-length=100']

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-d', '{extends: default, rules: {line-length: {max: 120}, document-start: disable, truthy: disable}}']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: no-commit-to-branch
        args: ['--branch', 'PLACEHOLDER_DEFAULT_BRANCH']
        # TODO: replace PLACEHOLDER_DEFAULT_BRANCH with the repo's default branch
        # Add additional --branch args if the repo protects other branches
